<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <title>DataTree</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
  <style>
    html, body {
        height: 100%;
        width: 100%;
        margin-top: 0px;
        margin-left: 0px;
    }
    body {
        overflow: hidden;
    }
    
    pre {
      font-family: 'Fira Code', monospace;
      line-height: 1.5;
      white-space: pre;
    }

    #printable { display: none; }

    @media print
    {
        #edit { display: none; }
        #treec { display: none; }
        #printable { display: block; }
    }

  </style>
</head>
<body>
<script src="edit.js"></script>
<script src="s-expr.js"></script>
<script src="tree.js"></script>
<script src="parser.js"></script>
<script src="data.js"></script>

<div id="edit" style="visibility: hidden; position: absolute; top: 0; left: 0; right: 0; bottom: 0;">
    <div id="input" class="container" style="padding: 0; border: 0; margin: 0; position: absolute; top: 0em; left: 0; right: 0; bottom: 0.75em;">
    </div>
    <script>
        var input1 = edit ("input");

        function getCoords (text, offset) {
            var i, ch, row = 1, col = 1;
            if (text.length > 0)
                for (i = 0; i < offset; i += 1) {
                    ch = text.charCodeAt(i);
                    if (ch === 13 || ch === 10) {
                        if (ch === 13 && text.charCodeAt (i + 1) === 10)
                            i += 1;

                        row += 1;
                        col = 1;
                        
                    } else
                      col += 1;
                }
            
            return {row: row, column: col};
        }

        document.addEventListener('selectionchange', function(e) {
            var pos = getCoords(input1.getValue(), input1.getSelectionStart());
            document.getElementById('lblGrammarCaret1').innerHTML = "[" + pos.row + ", " + pos.column + "]";
        });                    
    </script>

    <div id="lblGrammarCaret1" align="right" style="color: white; background-color: black; font-family: 'Fira Code', monospace; padding:0; border: 0; margin: 0; font-size: 0.75em; size: 0.75em; position: absolute; left: 0; right: 0; bottom: 0;">(1, 1)</div>
    <div id="err" align="left" style="color: white; font-family: 'Fira Code', monospace; padding:0; border: 0; margin: 0; font-size: 0.75em; size: 0.75em; position: absolute; left: 0; right: 0; bottom: 0;"></div>
    
    <div id="e1" onclick="switchToTree()" align="center" style="user-select:none; cursor: pointer; color: black; background-color: white; font-family: 'Fira Code', monospace; padding: 1em; position: absolute; right: 2em; top: 2em; width: 10em;">tree</div>
    <div id="e2" onclick="openf()" align="center" style="user-select:none; cursor: pointer; color: black; background-color: white; font-family: 'Fira Code', monospace; padding: 1em; position: absolute; right: 2em; top: 7em; width: 10em;">open</div>
    <div id="e3" onclick="savef()" align="center" style="user-select:none; cursor: pointer; color: black; background-color: white; font-family: 'Fira Code', monospace; padding: 1em; position: absolute; right: 2em; top: 12em; width: 10em;">save</div>
</div>

<div id="treec" style="">
    <div id="tree" style="overflow: auto; padding: 0; border: 0; margin: 0; position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: row; justify-content: center;">
        <div style="font-size: 0.75em;">
            <h1 id="title" align="left" style="font-family: 'Fira Code', monospace;"></h1>
            <p>
            <pre id="treeContent"></pre>
            </p>
        </div>
    </div>
    
    <div id="t1" onclick="switchToEdit()"  align="center" style="user-select:none; cursor: pointer; color: white; background-color: black; font-family: 'Fira Code', monospace; padding: 1em; position: absolute; right: 2em; top: 2em; width: 10em;">data</div>
</div>
    <div id="t2" onclick="openf()" align="center" style="user-select:none; cursor: pointer; color: white; background-color: black; font-family: 'Fira Code', monospace; padding: 1em; position: absolute; right: 2em; top: 7em; width: 10em;">open</div>
    <div id="t3" onclick="savef()" align="center" style="user-select:none; cursor: pointer; color: white; background-color: black; font-family: 'Fira Code', monospace; padding: 1em; position: absolute; right: 2em; top: 12em; width: 10em;">save</div>
</div>

<div id="printable" style="font-size: 0.5em;"></div>
<script>
function switchToTree() {
    if(!parsed) {
        window.alert("Data contains errors. Please fix them before switching to the tree panel.")
        input1.setFocus();
    }
    else {
        document.getElementById('treec').style.visibility = "visible";
        document.getElementById('edit').style.visibility = "hidden";
        document.getElementById('t1').style.visibility = "visible";
        document.getElementById('e1').style.visibility = "hidden";
        if ('showOpenFilePicker' in window) {
            document.getElementById('t2').style.visibility = "visible";
            document.getElementById('t3').style.visibility = "visible";
            document.getElementById('e2').style.visibility = "hidden";
            document.getElementById('e3').style.visibility = "hidden";
        }
        document.getElementById('tree').scrollTop = 0;
        document.getElementById('tree').focus();
    }
}

function switchToEdit() {
    document.getElementById('edit').style.visibility = "visible";
    document.getElementById('treec').style.visibility = "hidden";
    document.getElementById('e1').style.visibility = "visible";
    document.getElementById('t1').style.visibility = "hidden";
    if ('showOpenFilePicker' in window) {
        document.getElementById('e2').style.visibility = "visible";
        document.getElementById('e3').style.visibility = "visible";
        document.getElementById('t2').style.visibility = "hidden";
        document.getElementById('t3').style.visibility = "hidden";
    }
    input1.setFocus();
}

let parsed = null
let isDirty = false;

async function getParams() {
    const params = new URLSearchParams(document.location.search);
    const url = params.get("url");

    if (url) {
        try {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`Response status: ${response.status}`);
            }

            return await response.text();
        } catch (error) {
            //console.error(error.message);
            return getDefault();
        }
    }
    else {
        return getDefault();
    }
}

function getDefault() {
return `
(DATATREE
    (TITLE 'King Charles III<br>(lineage)')
    (TREE
        (PARENT
            (parents 'Queen Elizabeth II and Prince Philip'))
        
        (CHILDREN
            (TREE
                (PARENT
                    (son 'Charles Philip Artur George' 'Born Nov 14, 1948, London'))
                
                (CHILDREN
                    (TREE
                        (PARENT
                            (spouse 'Diana'))
                        
                        (CHILDREN
                            (TREE
                                (PARENT
                                    (son 'William Arthur Philip Louis' 'Born Jun 21, 1982, London')
                                    (spouse 'Catherine'))
                                
                                (CHILDREN
                                    (LEAF
                                        (son 'George Alexander Louis' 'Born Jul 22, 2013, London'))
                                    
                                    (LEAF
                                        (daughter 'Charlotte Elizabeth Diana' 'Born May 2, 2015, London'))
                                    
                                    (LEAF
                                        (son 'Louis Arthur Charles' 'Born Apr 23, 2018, London'))))
                            
                            (TREE
                                (PARENT
                                    (son 'Henry Charles Albert David' 'Born Sep 15, 1984, London')
                                    (spouse 'Meghan'))
                                
                                (CHILDREN
                                    (LEAF
                                        (son 'Arhcie Harrison Mountbatten-Windsor' 'Born May 6, 2019, Santa Barbara'))
                                    
                                    (LEAF
                                        (daughter 'Lilibet Diana Mountbatten-Windsor' 'Born Jun 4, 2021, Santa Barbara'))))))
                    
                    (LEAF
                        (spouse Camilla)))))))
`;
}

document.getElementById("input").addEventListener('keyup', () => {
    isDirty = true;
    populateTree(input1.getValue());
});

function populateInput(text) {
    input1.setValue(text);
    input1.setSelectionStart (0);
    input1.setSelectionEnd (0);
    input1.setFocus();
}

function populateTree(text) {
    cmp = Data.compile(text);

    if (cmp.err) {
        parsed = null;
        document.getElementById("title").innerHTML = "Data contains errors!";
        document.getElementById("treeContent").textContent = "";
        document.getElementById("err").innerHTML = "ERROR: " + cmp.err + " at " + "[" + (cmp.pos.y + 1) + ", " + (cmp.pos.x + 1) + "]" + (cmp.found ? (", found: '" + cmp.found + "'"): "");
    }
    else {
        document.getElementById("err").innerHTML = ""
        parsed = Data.removeComments(cmp);
        setTree(parsed[1][1], parsed[2]);
    }
}

function setTree(title, content) {
    document.getElementById("title").textContent = title;
    document.getElementById("title").innerHTML = document.getElementById("title").textContent.replaceAll("&lt;br&gt;", "<br>");
    document.getElementById("treeContent").textContent = "\n" + Tree.getTree(content) + "\n";
}

window.addEventListener('beforeprint', (event) => {
    document.getElementById("printable").innerHTML = document.getElementById("tree").innerHTML;
}, false);

window.addEventListener('afterprint', (event) => {
}, false);

async function openTextFile() {
    try {
        const [fileHandle] = await window.showOpenFilePicker({
            types: [{
                description: 'Text Files',
                accept: {
                    'text/plain': ['.txt']
                }
            }]
        });

        const file = await fileHandle.getFile();
        const content = await file.text();
        return { fileHandle, content };
    } catch (err) {
        console.error('Open cancelled or failed:', err);
    }
}

async function saveAsTextFile(content) {
    const fileHandle = await window.showSaveFilePicker({
        suggestedName: 'document.txt',
        types: [{
            description: 'Text Files',
            accept: {
                'text/plain': ['.txt']
            }
        }]
    });

    const writable = await fileHandle.createWritable();

    await writable.write(content);
    await writable.close();
}

async function openf() {
    if(!isDirty || confirm('You have unsaved changes. Continue anyway?')) {
        data = await openTextFile();
        populateInput(data.content);
        populateTree(data.content);
        isDirty = false;
    }
}

async function savef() {
    await saveAsTextFile(input1.getValue());
    isDirty = false;
}

if (!('showOpenFilePicker' in window)) {
    document.getElementById('t2').style.visibility = "hidden";
    document.getElementById('t3').style.visibility = "hidden";
    document.getElementById('e2').style.visibility = "hidden";
    document.getElementById('e3').style.visibility = "hidden";
}

async function init() {
    let data = await getParams();
    populateInput(data);
    populateTree(data);
}

setTimeout(init, 0);

window.addEventListener('beforeunload', (event) => {
    if (!isDirty) {
        return;
    }
    
    event.preventDefault();
    event.returnValue = '';

    return;
});

</script>

</body>
</html>
